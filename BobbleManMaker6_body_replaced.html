<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Character Creator</title>
    <style>
        :root {
            --primary: #007AFF;
            --bg: #f2f2f7;
            --card-bg: #ffffff;
            --text: #1c1c1e;
            --border: #e5e5ea;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* Preview Container */
        .preview-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            background-image: 
                linear-gradient(45deg, #e0e0e0 25%, transparent 25%), 
                linear-gradient(-45deg, #e0e0e0 25%, transparent 25%), 
                linear-gradient(45deg, transparent 75%, #e0e0e0 75%), 
                linear-gradient(-45deg, transparent 75%, #e0e0e0 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
            background-color: #f0f0f0;
            overflow: hidden;
        }

        canvas {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            filter: drop-shadow(0 15px 25px rgba(0,0,0,0.2));
        }

        /* Controls Section */
        .controls-container {
            background-color: var(--card-bg);
            padding: 20px;
            border-top-left-radius: 20px;
            border-top-right-radius: 20px;
            box-shadow: 0 -5px 15px rgba(0,0,0,0.05);
            max-height: 55vh;
            overflow-y: auto;
            padding-bottom: 40px;
        }

        .control-group {
            margin-bottom: 15px;
        }

        .slider-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            background: #f9f9f9;
            padding: 15px;
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        .control-group label {
            display: block;
            font-weight: 700;
            margin-bottom: 8px;
            font-size: 0.85rem;
            color: #555;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        select, input[type="color"] {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: 2px solid var(--border);
            background-color: var(--bg);
            font-size: 1rem;
            font-weight: 600;
            color: var(--text);
            appearance: none;
            outline: none;
        }

        input[type="range"] {
            width: 100%;
            accent-color: var(--primary);
            height: 6px;
            background: #ddd;
            border-radius: 5px;
            outline: none;
        }

        select {
            background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%23131313%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E");
            background-repeat: no-repeat;
            background-position: right 15px top 50%;
            background-size: 12px auto;
        }

        input[type="color"] {
            height: 60px;
            padding: 5px;
            cursor: pointer;
        }

        .download-btn {
            width: 100%;
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 18px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 12px;
            margin-top: 15px;
            cursor: pointer;
            box-shadow: 0 6px 15px rgba(0, 122, 255, 0.3);
            transition: transform 0.1s;
        }

        .download-btn:active {
            transform: scale(0.97);
        }
    </style>
</head>
<body>

    <div class="preview-container">
        <canvas id="characterCanvas" width="1000" height="1200"></canvas>
    </div>

    <div class="controls-container">
        <div class="control-group">
            <label for="headShape">Base Shape</label>
            <select id="headShape">
                <option value="teardrop">Teardrop (Rounded Soft Tip)</option>
                <option value="round">Round (Pink Style)</option>
            </select>
        </div>

        <div class="control-group">
            <label for="charColor">Color</label>
            <input type="color" id="charColor" value="#1FA2E5">
        </div>

        <div class="control-group slider-grid">
            <div>
                <label for="scaleHead">Head Size</label>
                <input type="range" id="scaleHead" min="0.6" max="1.4" step="0.05" value="1">
            </div>
            <div>
                <label for="scaleBody">Body Size</label>
                <input type="range" id="scaleBody" min="0.5" max="1.5" step="0.05" value="1">
            </div>
            <div>
                <label for="scaleEyes">Eye Size</label>
                <input type="range" id="scaleEyes" min="0.5" max="1.8" step="0.05" value="1">
            </div>
            <div>
                <label for="scaleMouth">Mouth Size</label>
                <input type="range" id="scaleMouth" min="0.5" max="1.8" step="0.05" value="1">
            </div>
        </div>

        <div class="control-group">
            <label for="eyeType">Eyes</label>
            <select id="eyeType">
                <option value="standard">Standard</option>
                <option value="small">Small</option>
                <option value="massive">Massive</option>
                <option value="angry">Angry</option>
            </select>
        </div>

        <div class="control-group">
            <label for="mouthShape">Mouth</label>
            <select id="mouthShape">
                <option value="sad">Sad</option>
                <option value="happy">Happy</option>
                <option value="straight">Straight</option>
                <option value="angry">Angry</option>
                <option value="zigzag">Zigzag</option>
                <option value="shocked">Shocked</option>
            </select>
        </div>

        <button class="download-btn" id="downloadBtn">Download Transparent PNG</button>
    </div>

    <script>
        const canvas = document.getElementById('characterCanvas');
        const ctx = canvas.getContext('2d');

        // Form Inputs
        const shapeSelect = document.getElementById('headShape');
        const colorSelect = document.getElementById('charColor');
        const eyeSelect = document.getElementById('eyeType');
        const mouthSelect = document.getElementById('mouthShape');
        
        const scaleHead = document.getElementById('scaleHead');
        const scaleBody = document.getElementById('scaleBody');
        const scaleEyes = document.getElementById('scaleEyes');
        const scaleMouth = document.getElementById('scaleMouth');

        // Global base coordinates
        const cx = 500;
        const cy = 480; 
        const strokeW = 32; // Standard thick outline

        function drawCharacter() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            const shape = shapeSelect.value;
            const color = colorSelect.value;
            
            // Get scales
            const sHead = parseFloat(scaleHead.value);
            const sBody = parseFloat(scaleBody.value);
            const sEyes = parseFloat(scaleEyes.value);
            const sMouth = parseFloat(scaleMouth.value);

            ctx.lineJoin = 'round';
            ctx.lineCap = 'round';

            // Draw Layer 1: Body
            drawBody(shape, color, sBody);

            // Draw Layer 2: Head & Highlights
            drawHead(shape, color, sHead);

            // Draw Layer 3: Face
            drawEyes(eyeSelect.value, shape, sEyes);
            drawMouth(mouthSelect.value, shape, sMouth);
        }

function drawHead(shape, color, scale) {
            ctx.save();
            ctx.translate(cx, cy);
            ctx.scale(scale, scale);
            ctx.translate(-cx, -cy);

            ctx.fillStyle = color;
            ctx.strokeStyle = '#000000';
            ctx.lineWidth = strokeW / scale;

            ctx.beginPath();
            if (shape === 'round') {
                ctx.arc(cx, cy, 340, 0, Math.PI * 2);
            } else if (shape === 'teardrop') {
                const headY = cy + 70;
                const r = 330; 
                const topY = headY - 520;
                const cpTopX = 80; 
                const cpSideY = headY - 250; 
                
                // Bottom arc (Starts at right, goes through bottom to left)
                ctx.arc(cx, headY, r, 0, Math.PI, false); 
                
                // Left cheek smoothly swooping up to the soft, rounded tip
                ctx.bezierCurveTo(
                    cx - r, cpSideY, 
                    cx - cpTopX, topY, 
                    cx, topY
                );
                
                // Right side smoothly swooping down from the rounded tip to the right cheek
                ctx.bezierCurveTo(
                    cx + cpTopX, topY, 
                    cx + r, cpSideY, 
                    cx + r, headY
                );
            }
            ctx.closePath();
            ctx.fill();
            ctx.stroke();

            // Draw highlights inside the scale
            drawHighlights(shape);

            ctx.restore();
        }

        function drawHighlights(shape) {
            ctx.fillStyle = '#ffffff';

            if (shape === 'round') {
                ctx.beginPath();
                ctx.arc(cx, cy, 305, 1.05 * Math.PI, 1.45 * Math.PI);
                ctx.bezierCurveTo(cx - 150, cy - 200, cx - 250, cy - 50, cx - 295, cy + 50);
                ctx.fill();
                
                ctx.beginPath();
                ctx.ellipse(cx - 240, cy + 10, 20, 35, -10 * Math.PI/180, 0, Math.PI * 2);
                ctx.fill();

            } else if (shape === 'teardrop') {
                // Smooth highlight hugging the left curve
                ctx.beginPath();
                ctx.moveTo(cx - 250, cy + 20);
                ctx.bezierCurveTo(cx - 250, cy - 150, cx - 100, cy - 350, cx - 30, cy - 390);
                ctx.lineTo(cx - 10, cy - 380);
                ctx.bezierCurveTo(cx - 80, cy - 340, cx - 210, cy - 120, cx - 200, cy + 30);
                ctx.closePath();
                ctx.fill();

                // Small dot
                ctx.beginPath();
                ctx.ellipse(cx - 230, cy + 90, 16, 32, -20 * Math.PI/180, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function drawEyes(eyes, shape, scale) {
            const eyeY = shape === 'round' ? cy - 30 : cy + 70;
            const eyeSpacing = 120;
            
            ctx.save();
            ctx.translate(cx, eyeY);
            ctx.scale(scale, scale);
            ctx.translate(-cx, -eyeY);

            ctx.fillStyle = '#000000';
            ctx.strokeStyle = '#000000';
            
            let radius = 38; 
            if (eyes === 'small') radius = 22;
            if (eyes === 'massive') radius = 65;
            
            ctx.beginPath(); ctx.arc(cx - eyeSpacing, eyeY, radius, 0, Math.PI * 2); ctx.fill(); 
            ctx.beginPath(); ctx.arc(cx + eyeSpacing, eyeY, radius, 0, Math.PI * 2); ctx.fill(); 

            if (eyes === 'angry') {
                ctx.lineWidth = 28 / scale;
                ctx.beginPath(); ctx.moveTo(cx - eyeSpacing - 60, eyeY - 45); ctx.lineTo(cx - eyeSpacing + 30, eyeY - 10); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(cx + eyeSpacing + 60, eyeY - 45); ctx.lineTo(cx + eyeSpacing - 30, eyeY - 10); ctx.stroke();
            }

            ctx.restore();
        }

        function drawMouth(mouth, shape, scale) {
            const mouthY = shape === 'round' ? cy + 100 : cy + 200;
            const mouthWidth = 85;

            ctx.save();
            ctx.translate(cx, mouthY);
            ctx.scale(scale, scale);
            ctx.translate(-cx, -mouthY);

            ctx.strokeStyle = '#000000';
            ctx.fillStyle = '#000000';
            ctx.lineWidth = 32 / scale;

            ctx.beginPath();
            switch (mouth) {
                case 'sad':
                    ctx.arc(cx, mouthY + 70, mouthWidth * 1.5, 1.15 * Math.PI, 1.85 * Math.PI, false);
                    ctx.stroke();
                    break;
                case 'happy':
                    ctx.arc(cx, mouthY - 30, mouthWidth, 0.1 * Math.PI, 0.9 * Math.PI, false);
                    ctx.stroke();
                    break;
                case 'straight':
                    ctx.lineWidth = 42 / scale;
                    ctx.moveTo(cx - mouthWidth * 1.3, mouthY - 10);
                    ctx.lineTo(cx + mouthWidth * 1.3, mouthY - 10);
                    ctx.stroke();
                    break;
                case 'angry':
                    ctx.arc(cx, mouthY + 40, mouthWidth * 0.8, 1.1 * Math.PI, 1.9 * Math.PI, false);
                    ctx.stroke();
                    break;
                case 'zigzag':
                    ctx.lineWidth = 22 / scale;
                    ctx.moveTo(cx - 70, mouthY - 10);
                    ctx.lineTo(cx - 25, mouthY + 30);
                    ctx.lineTo(cx + 25, mouthY - 30);
                    ctx.lineTo(cx + 70, mouthY - 10);
                    ctx.stroke();
                    break;
                case 'shocked':
                    ctx.arc(cx, mouthY + 10, 35, 0, Math.PI * 2);
                    ctx.fill();
                    break;
            }

            ctx.restore();
        }

        // Add event listeners to all inputs
        [
            shapeSelect, colorSelect, eyeSelect, mouthSelect,
            scaleHead, scaleBody, scaleEyes, scaleMouth
        ].forEach(input => input.addEventListener('input', drawCharacter));

        // High-Res Download
        document.getElementById('downloadBtn').addEventListener('click', () => {
            const link = document.createElement('a');
            link.download = 'custom-character.png';
            link.href = canvas.toDataURL('image/png');
            link.click();
        });

        // Init
        drawCharacter();

    </script>
